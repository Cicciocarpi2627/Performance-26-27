name: Aggiorna dashboard GPS da Google Drive

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggiorna-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas openpyxl "gdown>=5.1.0"

      - name: Scarica XLSX da Google Drive
        run: gdown "https://drive.google.com/uc?id=1KcF1dXYJLAb_XQkVQMJUSnOKaw6wrSdy" -O dati.xlsx

      - name: Aggiorna index.html
        run: python genera_html.py dati.xlsx index.html

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if ! git diff --staged --quiet; then
            git commit -m "Aggiornamento dati GPS"
            for i in 1 2 3 4 5; do
              git fetch origin main
              git rebase origin/main && git push origin main && break
              git rebase --abort || true
              sleep 5
            done
          else
            echo "Nessuna modifica da pubblicare."
          fi
