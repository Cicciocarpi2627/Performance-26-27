<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Log — A.C. Carpi</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8102e">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A.C. Carpi">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Note: Gotham is a commercial typeface not available via free web-font services.
     Montserrat is used throughout as the closest freely-licensed geometric substitute. -->
<style>
  :root{
    --bg:#faf9f8;
    --surface:#ffffff;
    --surface-2:#f4f2f1;
    --surface-3:#ececea;
    --line:#e2dfdc;
    --line-soft:#edebe8;
    --text:#181614;
    --text-dim:#726d68;
    --text-faint:#a39d97;

    --red:#c8102e;
    --red-dark:#8c0f22;
    --red-light:#f7dade;
    --ink:#141312;
    --ink-2:#3a3733;

    --tech:#c8102e;      /* technical/tactical accent */
    --cond:#141312;      /* conditioning accent */
    --am:#c8102e;
    --pm:#141312;
    --danger:#b91c1c;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Montserrat', sans-serif;
    min-height:100vh;
  }
  .display{font-family:'Montserrat', sans-serif; text-transform:uppercase; letter-spacing:0.04em;}

  /* Layout shell */
  .shell{max-width:1180px; margin:0 auto; padding:28px 24px 80px;}

  header.top{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:3px solid var(--red); padding-bottom:18px; margin-bottom:22px;
    flex-wrap:wrap; gap:16px;
  }
  .brand{display:flex; align-items:center; gap:16px;}
  .club-logo{height:64px; width:auto; display:block; flex-shrink:0;}
  .brand-text{display:flex; flex-direction:column; gap:2px;}
  .brand h1{
    font-size:28px; font-weight:800; margin:0; letter-spacing:0.01em; color:var(--ink);
    line-height:1.05;
  }
  .brand .club-name{
    font-family:'Montserrat',sans-serif; font-weight:700; font-size:13px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--red);
  }
  .brand small{color:var(--text-faint); font-family:'Montserrat',sans-serif; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;}

  .legend{display:flex; gap:16px; font-size:11px; color:var(--text-dim); letter-spacing:.04em; flex-wrap:wrap;}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .legend i{width:9px; height:9px; display:inline-block; border-radius:50%;}
  .legend .l-tech{background:var(--tech);}
  .legend .l-cond{background:var(--cond);}
  .legend .l-md{background:var(--red);}
  .legend .l-tr{background:var(--ink-2); border-radius:2px;}

  /* Controls */
  .controls{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    margin-bottom:20px; flex-wrap:wrap;
  }
  .view-toggle{display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .view-toggle button{
    background:var(--surface); color:var(--text-dim); border:none; padding:9px 20px;
    font-family:'Montserrat',sans-serif; letter-spacing:.04em; text-transform:uppercase; font-size:13px;
    cursor:pointer; transition:.15s;
  }
  .view-toggle button.active{background:var(--red); color:#fff; font-weight:600;}
  .view-toggle button:not(.active):hover{background:var(--surface-2); color:var(--text);}

  .nav{display:flex; align-items:center; gap:10px;}
  .nav button{
    background:var(--surface); border:1px solid var(--line); color:var(--text);
    width:34px; height:34px; cursor:pointer; font-size:15px; border-radius:var(--radius);
  }
  .nav button:hover{background:var(--surface-2); border-color:var(--red);}
  .nav .period-label{font-family:'Montserrat',sans-serif; font-weight:600; font-size:15px; letter-spacing:.03em; text-transform:uppercase; min-width:210px; text-align:center; color:var(--ink);}
  .nav .today-btn{
    background:transparent; border:1px solid var(--line); color:var(--text-dim);
    font-family:'Montserrat',sans-serif; font-size:11px; padding:0 12px; width:auto; height:34px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .nav .today-btn:hover{color:var(--red); border-color:var(--red);}

  .add-btn{
    background:var(--red); color:#fff; border:none; font-family:'Montserrat',sans-serif;
    letter-spacing:.06em; text-transform:uppercase; font-size:13px; font-weight:600;
    padding:10px 18px; cursor:pointer; border-radius:var(--radius);
  }
  .add-btn:hover{background:var(--red-dark);}

  /* WEEK VIEW */
  .week-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:10px;}
  .day-col{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    min-height:230px; display:flex; flex-direction:column;
  }
  .day-col.is-today{border-color:var(--red); box-shadow:inset 0 0 0 1px var(--red);}
  .day-head{
    padding:10px 12px; border-bottom:1px solid var(--line-soft);
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .day-head .dow{font-family:'Montserrat',sans-serif; font-size:11px; letter-spacing:.1em; color:var(--text-faint); text-transform:uppercase;}
  .day-head .dnum{font-family:'Montserrat',sans-serif; font-size:20px; font-weight:600; color:var(--ink);}
  .day-col.is-today .dnum{color:var(--red);}
  .day-body{flex:1; padding:8px; display:flex; flex-direction:column; gap:6px;}
  .session-chip{
    background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius);
    padding:8px 9px; cursor:pointer; font-size:11px; position:relative;
  }
  .session-chip.is-match{background:var(--red-light); border-color:var(--red);}
  .session-chip:hover{border-color:var(--red);}
  .session-chip .sc-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:6px; flex-wrap:wrap;}
  .badge{
    font-family:'Montserrat',sans-serif; font-size:10px; letter-spacing:.04em; text-transform:uppercase;
    padding:2px 7px; border-radius:8px; font-weight:600;
  }
  .badge.am{background:rgba(200,16,46,.12); color:var(--red);}
  .badge.pm{background:rgba(20,19,18,.09); color:var(--ink);}
  .badge.type-training{background:var(--surface-3); color:var(--ink-2); border:1px solid var(--line);}
  .badge.type-match{background:var(--red); color:#fff;}
  .badge.md{background:transparent; color:var(--red); border:1px solid var(--red); font-weight:700;}
  .fill-row{display:flex; gap:3px;}
  .fill-dot{width:6px; height:6px; border-radius:50%; background:var(--line);}
  .fill-dot.tech.on{background:var(--tech);}
  .fill-dot.cond.on{background:var(--cond);}
  .sc-note{color:var(--text-faint); margin-top:5px; font-size:10px; line-height:1.4; max-height:28px; overflow:hidden;}
  .day-add{
    margin-top:auto; background:transparent; border:1px dashed var(--line); color:var(--text-faint);
    padding:7px; font-size:11px; cursor:pointer; border-radius:var(--radius); font-family:'Montserrat',sans-serif;
    letter-spacing:.04em;
  }
  .day-add:hover{border-color:var(--red); color:var(--red);}

  /* MONTH VIEW */
  .month-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
  .month-dow{
    font-family:'Montserrat',sans-serif; font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--text-faint); text-align:center; padding-bottom:4px;
  }
  .month-cell{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    min-height:92px; padding:8px; cursor:pointer; display:flex; flex-direction:column; gap:6px;
  }
  .month-cell:hover{border-color:var(--red);}
  .month-cell.outside{opacity:.32;}
  .month-cell.is-today{border-color:var(--red); box-shadow:inset 0 0 0 1px var(--red);}
  .month-cell.has-match{background:var(--red-light);}
  .month-cell .mc-num{font-family:'Montserrat',sans-serif; font-size:15px; font-weight:600; color:var(--ink);}
  .month-cell.is-today .mc-num{color:var(--red);}
  .mc-sessions{display:flex; flex-direction:column; gap:3px; margin-top:auto;}
  .mc-tag{
    font-size:9.5px; padding:2px 5px; border-radius:2px; display:flex; align-items:center; gap:4px;
    background:var(--surface-2); color:var(--text-dim);
  }
  .mc-tag.match{background:var(--red); color:#fff; font-weight:600;}
  .mc-tag i{width:6px; height:6px; border-radius:50%;}
  .mc-tag i.am{background:var(--red);} .mc-tag i.pm{background:var(--ink);}

  /* MODAL */
  .overlay{
    position:fixed; inset:0; background:rgba(20,18,17,.55); display:none;
    align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--surface); border:1px solid var(--line); width:100%; max-width:640px;
    border-radius:var(--radius); animation:rise .15s ease-out; box-shadow:0 20px 50px rgba(20,18,17,.18);
  }
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .modal-head{
    display:flex; justify-content:space-between; align-items:center; padding:18px 22px;
    border-bottom:1px solid var(--line); border-top:3px solid var(--red);
  }
  .modal-head h2{font-family:'Montserrat',sans-serif; font-size:19px; margin:0; letter-spacing:.04em; text-transform:uppercase; color:var(--ink);}
  .modal-head button{background:none; border:none; color:var(--text-faint); font-size:20px; cursor:pointer; line-height:1;}
  .modal-head button:hover{color:var(--danger);}
  .modal-body{padding:20px 22px; display:flex; flex-direction:column; gap:16px;}

  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .field label{
    display:block; font-family:'Montserrat',sans-serif; font-size:11px; letter-spacing:.04em;
    text-transform:uppercase; color:var(--text-dim); margin-bottom:6px;
  }
  .field input[type=date], .field input[type=text], .field textarea, .field select{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--text);
    padding:9px 10px; font-family:'Montserrat',sans-serif; font-size:13px; border-radius:var(--radius);
  }
  .field input:focus, .field textarea:focus, .field select:focus{outline:none; border-color:var(--red);}
  .field textarea{resize:vertical; min-height:64px;}

  .session-toggle{display:flex; gap:8px;}
  .session-toggle button{
    flex:1; padding:9px; background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim);
    font-family:'Montserrat',sans-serif; letter-spacing:.06em; text-transform:uppercase; font-size:12px; cursor:pointer;
    border-radius:var(--radius);
  }
  .session-toggle button.sel.am{background:var(--red-light); border-color:var(--red); color:var(--red);}
  .session-toggle button.sel.pm{background:var(--surface-3); border-color:var(--ink); color:var(--ink);}
  .session-toggle button.sel.type-training{background:var(--surface-3); border-color:var(--ink); color:var(--ink);}
  .session-toggle button.sel.type-match{background:var(--red); border-color:var(--red); color:#fff;}

  .md-wrap{display:none;}
  .md-wrap.show{display:block;}
  .md-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .md-grid button{
    padding:9px 4px; background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim);
    font-family:'Montserrat',sans-serif; font-size:12px; cursor:pointer; border-radius:var(--radius);
  }
  .md-grid button.sel{background:var(--red); border-color:var(--red); color:#fff; font-weight:600;}
  .md-hint{font-size:10.5px; color:var(--text-faint); margin-top:6px; line-height:1.5;}

  .section-label{
    font-family:'Montserrat',sans-serif; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    display:flex; align-items:center; gap:8px; margin-top:4px;
  }
  .section-label i{width:8px; height:8px; border-radius:50%;}
  .section-label.tech{color:var(--tech);} .section-label.tech i{background:var(--tech);}
  .section-label.cond{color:var(--cond);} .section-label.cond i{background:var(--cond);}

  .grid4{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .grid4 .field label{font-size:10px; color:var(--text-faint);}

  .modal-foot{
    display:flex; justify-content:space-between; align-items:center; padding:16px 22px;
    border-top:1px solid var(--line);
  }
  .btn{
    font-family:'Montserrat',sans-serif; letter-spacing:.06em; text-transform:uppercase; font-size:13px;
    padding:10px 20px; border-radius:var(--radius); cursor:pointer; border:1px solid var(--line);
  }
  .btn-save{background:var(--red); color:#fff; border:none; font-weight:600;}
  .btn-save:hover{background:var(--red-dark);}
  .btn-del{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  .btn-del:hover{background:rgba(185,28,28,.08);}
  .btn-cancel{background:transparent; color:var(--text-dim);}

  @media (max-width:900px){
    .week-grid{grid-template-columns:repeat(7,minmax(130px,1fr)); overflow-x:auto;}
    .month-grid{grid-template-columns:repeat(7,minmax(70px,1fr)); overflow-x:auto;}
    .field-row{grid-template-columns:1fr;}
    .grid4{grid-template-columns:1fr;}
  }
</style>
</head>

      <div class="brand-text">
        <h1>Training Log</h1>
        <span class="club-name">A.C. Carpi</span>
        <small>Daily sessions · Weekly &amp; monthly overview</small>
      </div>
    </div>
    <div class="legend">
      <span><i class="l-tr" style="border-radius:2px;"></i>Training</span>
      <span><i class="l-md"></i>Match Day</span>
      <span><i class="l-tech"></i>Technical / Tactical</span>
      <span><i class="l-cond"></i>Conditioning</span>
    </div>
  </header>

  <div class="controls">
    <div class="view-toggle">
      <button id="btnWeek" class="active">Week</button>
      <button id="btnMonth">Month</button>
    </div>
    <div class="nav">
      <button id="prevBtn">‹</button>
      <div class="period-label" id="periodLabel">—</div>
      <button id="nextBtn">›</button>
      <button class="today-btn" id="todayBtn">Today</button>
    </div>
    <button class="add-btn" id="addBtn">+ New session</button>
  </div>

  <div id="weekView" class="week-grid"></div>
  <div id="monthView" class="month-grid" style="display:none;"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">New Session</h2>
      <button id="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="f_date">
        </div>
        <div class="field">
          <label>Session</label>
          <div class="session-toggle">
            <button type="button" id="btnAM" data-val="AM">Morning</button>
            <button type="button" id="btnPM" data-val="PM">Afternoon</button>
          </div>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Day type</label>
          <div class="session-toggle">
            <button type="button" id="btnTraining" data-val="training">Training</button>
            <button type="button" id="btnMatch" data-val="match">Match Day</button>
          </div>
        </div>
        <div class="field md-wrap" id="mdWrap">
          <label>Distance from next match</label>
          <div class="md-grid" id="mdGrid"></div>
          <div class="md-hint">MD-1 = day before the match … MD-8 = eight days out.</div>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Warm-up 1</label>
          <input type="text" id="f_wu1" placeholder="e.g. Dynamic mobility routine">
        </div>
        <div class="field">
          <label>Warm-up 2</label>
          <input type="text" id="f_wu2" placeholder="e.g. Activation drills">
        </div>
      </div>

      <div class="section-label tech"><i></i>Technical / Tactical Skills</div>
      <div class="grid4">
        <div class="field"><label>Skill 1</label><input type="text" id="f_t1"></div>
        <div class="field"><label>Skill 2</label><input type="text" id="f_t2"></div>
        <div class="field"><label>Skill 3</label><input type="text" id="f_t3"></div>
        <div class="field"><label>Skill 4</label><input type="text" id="f_t4"></div>
      </div>

      <div class="section-label cond"><i></i>Conditioning</div>
      <div class="grid4">
        <div class="field"><label>Drill 1</label><input type="text" id="f_c1"></div>
        <div class="field"><label>Drill 2</label><input type="text" id="f_c2"></div>
        <div class="field"><label>Drill 3</label><input type="text" id="f_c3"></div>
        <div class="field"><label>Drill 4</label><input type="text" id="f_c4"></div>
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="f_notes" placeholder="Fatigue, feeling, adjustments, coach remarks…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-del" id="deleteBtn" style="display:none;">Delete</button>
      <div style="display:flex; gap:10px; margin-left:auto;">
        <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn btn-save" id="saveBtn">Save session</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'training-log-entries-v2';
  const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let entries = loadEntries();
  let view = 'week'; // 'week' | 'month'
  let anchorDate = new Date(); // current reference date
  let editingId = null;

  function loadEntries(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveEntries(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }catch(e){}
  }

  function toISO(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function sameDay(a,b){ return toISO(a)===toISO(b); }
  function startOfWeek(d){
    const nd = new Date(d);
    const day = (nd.getDay()+6)%7; // Monday=0
    nd.setDate(nd.getDate()-day);
    nd.setHours(0,0,0,0);
    return nd;
  }

  function typeLabel(e){
    if(e.dtype==='match') return 'MD';
    return e.md ? `MD-${e.md}` : 'Training';
  }

  // ---------- Rendering ----------
  const weekViewEl = document.getElementById('weekView');
  const monthViewEl = document.getElementById('monthView');
  const periodLabel = document.getElementById('periodLabel');

  function render(){
    if(view==='week') renderWeek(); else renderMonth();
  }

  function renderWeek(){
    weekViewEl.style.display='grid';
    monthViewEl.style.display='none';
    const start = startOfWeek(anchorDate);
    const end = new Date(start); end.setDate(end.getDate()+6);
    periodLabel.textContent = `${start.getDate()} ${MONTHS[start.getMonth()].slice(0,3)} – ${end.getDate()} ${MONTHS[end.getMonth()].slice(0,3)} ${end.getFullYear()}`;

    weekViewEl.innerHTML='';
    const today = new Date();
    for(let i=0;i<7;i++){
      const d = new Date(start); d.setDate(start.getDate()+i);
      const iso = toISO(d);
      const col = document.createElement('div');
      col.className = 'day-col'+(sameDay(d,today)?' is-today':'');

      const dayEntries = entries.filter(e=>e.date===iso).sort((a,b)=> a.session==='AM'?-1:1);

      let chipsHtml='';
      if(dayEntries.length){
        chipsHtml = dayEntries.map(e=>sessionChip(e)).join('');
      }

      col.innerHTML = `
        <div class="day-head">
          <span class="dow">${DOW[i]}</span>
          <span class="dnum">${d.getDate()}</span>
        </div>
        <div class="day-body">
          ${chipsHtml}
          <button class="day-add" data-date="${iso}">+ Add session</button>
        </div>`;
      weekViewEl.appendChild(col);
    }

    weekViewEl.querySelectorAll('.day-add').forEach(btn=>{
      btn.addEventListener('click', ()=> openModal(null, btn.dataset.date));
    });
    weekViewEl.querySelectorAll('.session-chip').forEach(chip=>{
      chip.addEventListener('click', ()=> openModal(chip.dataset.id));
    });
  }

  function sessionChip(e){
    const filledTech = [e.t1,e.t2,e.t3,e.t4].filter(v=>v && v.trim()).length;
    const filledCond = [e.c1,e.c2,e.c3,e.c4].filter(v=>v && v.trim()).length;
    let techDots=''; for(let i=0;i<4;i++) techDots+=`<span class="fill-dot tech ${i<filledTech?'on':''}"></span>`;
    let condDots=''; for(let i=0;i<4;i++) condDots+=`<span class="fill-dot cond ${i<filledCond?'on':''}"></span>`;
    const isMatch = e.dtype==='match';
    return `<div class="session-chip ${isMatch?'is-match':''}" data-id="${e.id}">
      <div class="sc-top">
        <span class="badge ${e.session.toLowerCase()}">${e.session==='AM'?'Morning':'Afternoon'}</span>
        <span class="badge ${isMatch?'type-match':'type-training'}">${isMatch?'Match Day':'Training'}</span>
        ${(!isMatch && e.md) ? `<span class="badge md">MD-${e.md}</span>` : ''}
      </div>
      <div class="fill-row">${techDots}${condDots}</div>
      ${e.notes ? `<div class="sc-note">${escapeHtml(e.notes)}</div>` : ''}
    </div>`;
  }

  function renderMonth(){
    weekViewEl.style.display='none';
    monthViewEl.style.display='grid';
    const y = anchorDate.getFullYear(), m = anchorDate.getMonth();
    periodLabel.textContent = `${MONTHS[m]} ${y}`;

    monthViewEl.innerHTML='';
    DOW.forEach(d=>{
      const el = document.createElement('div');
      el.className='month-dow'; el.textContent=d;
      monthViewEl.appendChild(el);
    });

    const firstOfMonth = new Date(y,m,1);
    const gridStart = startOfWeek(firstOfMonth);
    const today = new Date();

    for(let i=0;i<42;i++){
      const d = new Date(gridStart); d.setDate(gridStart.getDate()+i);
      const iso = toISO(d);
      const outside = d.getMonth()!==m;
      const dayEntries = entries.filter(e=>e.date===iso);
      const hasMatch = dayEntries.some(e=>e.dtype==='match');
      const cell = document.createElement('div');
      cell.className = 'month-cell'+(outside?' outside':'')+(sameDay(d,today)?' is-today':'')+(hasMatch?' has-match':'');
      const tags = dayEntries.slice(0,3).map(e=>{
        const isMatch = e.dtype==='match';
        return `<div class="mc-tag ${isMatch?'match':''}"><i class="${e.session.toLowerCase()}"></i>${e.session} · ${typeLabel(e)}</div>`;
      }).join('');
      cell.innerHTML = `<div class="mc-num">${d.getDate()}</div><div class="mc-sessions">${tags}</div>`;
      cell.addEventListener('click', ()=>{
        anchorDate = d;
        view='week';
        document.getElementById('btnWeek').classList.add('active');
        document.getElementById('btnMonth').classList.remove('active');
        render();
      });
      monthViewEl.appendChild(cell);
    }
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Modal ----------
  const overlay = document.getElementById('overlay');
  const modalTitle = document.getElementById('modalTitle');
  const deleteBtn = document.getElementById('deleteBtn');
  const btnAM = document.getElementById('btnAM');
  const btnPM = document.getElementById('btnPM');
  const btnTraining = document.getElementById('btnTraining');
  const btnMatch = document.getElementById('btnMatch');
  const mdWrap = document.getElementById('mdWrap');
  const mdGrid = document.getElementById('mdGrid');
  let currentSession = 'AM';
  let currentType = 'training';
  let currentMd = null;

  // build MD-1 .. MD-8 buttons
  for(let i=1;i<=8;i++){
    const b = document.createElement('button');
    b.type='button';
    b.textContent = `MD-${i}`;
    b.dataset.val = i;
    b.addEventListener('click', ()=>{ currentMd = i; updateMdButtons(); });
    mdGrid.appendChild(b);
  }
  function updateMdButtons(){
    mdGrid.querySelectorAll('button').forEach(b=>{
      b.classList.toggle('sel', Number(b.dataset.val)===currentMd);
    });
  }

  const fIds = ['date','wu1','wu2','t1','t2','t3','t4','c1','c2','c3','c4','notes'];
  function fEl(id){ return document.getElementById('f_'+id); }

  function openModal(id, presetDate){
    editingId = id;
    if(id){
      const e = entries.find(x=>x.id===id);
      modalTitle.textContent = 'Edit Session';
      deleteBtn.style.display='inline-block';
      fEl('date').value = e.date;
      currentSession = e.session;
      currentType = e.dtype || 'training';
      currentMd = e.md || null;
      fEl('wu1').value = e.wu1||''; fEl('wu2').value = e.wu2||'';
      fEl('t1').value=e.t1||''; fEl('t2').value=e.t2||''; fEl('t3').value=e.t3||''; fEl('t4').value=e.t4||'';
      fEl('c1').value=e.c1||''; fEl('c2').value=e.c2||''; fEl('c3').value=e.c3||''; fEl('c4').value=e.c4||'';
      fEl('notes').value = e.notes||'';
    } else {
      modalTitle.textContent = 'New Session';
      deleteBtn.style.display='none';
      fIds.forEach(id=>{ if(id!=='date') fEl(id).value=''; });
      fEl('date').value = presetDate || toISO(new Date());
      currentSession = 'AM';
      currentType = 'training';
      currentMd = null;
    }
    updateSessionButtons();
    updateTypeButtons();
    updateMdButtons();
    overlay.classList.add('open');
  }
  function closeModal(){ overlay.classList.remove('open'); editingId=null; }

  function updateSessionButtons(){
    btnAM.classList.toggle('sel', currentSession==='AM');
    btnAM.classList.toggle('am', currentSession==='AM');
    btnPM.classList.toggle('sel', currentSession==='PM');
    btnPM.classList.toggle('pm', currentSession==='PM');
  }
  function updateTypeButtons(){
    btnTraining.classList.toggle('sel', currentType==='training');
    btnTraining.classList.toggle('type-training', currentType==='training');
    btnMatch.classList.toggle('sel', currentType==='match');
    btnMatch.classList.toggle('type-match', currentType==='match');
    mdWrap.classList.toggle('show', currentType==='training');
    if(currentType==='match') currentMd = null;
  }
  btnAM.addEventListener('click', ()=>{ currentSession='AM'; updateSessionButtons(); });
  btnPM.addEventListener('click', ()=>{ currentSession='PM'; updateSessionButtons(); });
  btnTraining.addEventListener('click', ()=>{ currentType='training'; updateTypeButtons(); updateMdButtons(); });
  btnMatch.addEventListener('click', ()=>{ currentType='match'; updateTypeButtons(); updateMdButtons(); });

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const date = fEl('date').value;
    if(!date){ fEl('date').focus(); return; }
    const data = {
      id: editingId || (Date.now().toString(36)+Math.random().toString(36).slice(2,7)),
      date, session: currentSession,
      dtype: currentType, md: currentType==='training' ? currentMd : null,
      wu1: fEl('wu1').value, wu2: fEl('wu2').value,
      t1: fEl('t1').value, t2: fEl('t2').value, t3: fEl('t3').value, t4: fEl('t4').value,
      c1: fEl('c1').value, c2: fEl('c2').value, c3: fEl('c3').value, c4: fEl('c4').value,
      notes: fEl('notes').value
    };
    if(editingId){
      const idx = entries.findIndex(x=>x.id===editingId);
      entries[idx] = data;
    } else {
      entries.push(data);
    }
    saveEntries();
    closeModal();
    render();
  });

  deleteBtn.addEventListener('click', ()=>{
    if(!editingId) return;
    entries = entries.filter(x=>x.id!==editingId);
    saveEntries();
    closeModal();
    render();
  });

  document.getElementById('addBtn').addEventListener('click', ()=> openModal(null, toISO(anchorDate)));

  // ---------- Nav ----------
  document.getElementById('btnWeek').addEventListener('click', ()=>{
    view='week';
    document.getElementById('btnWeek').classList.add('active');
    document.getElementById('btnMonth').classList.remove('active');
    render();
  });
  document.getElementById('btnMonth').addEventListener('click', ()=>{
    view='month';
    document.getElementById('btnMonth').classList.add('active');
    document.getElementById('btnWeek').classList.remove('active');
    render();
  });
  document.getElementById('prevBtn').addEventListener('click', ()=>{
    if(view==='week') anchorDate.setDate(anchorDate.getDate()-7);
    else anchorDate.setMonth(anchorDate.getMonth()-1);
    anchorDate = new Date(anchorDate);
    render();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(view==='week') anchorDate.setDate(anchorDate.getDate()+7);
    else anchorDate.setMonth(anchorDate.getMonth()+1);
    anchorDate = new Date(anchorDate);
    render();
  });
  document.getElementById('todayBtn').addEventListener('click', ()=>{
    anchorDate = new Date();
    render();
  });

  render();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    });
  }
</script>
</body>
</html>
