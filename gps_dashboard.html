<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAFA;--bg2:#FFFFFF;--bg3:#F3F4F6;--border:#E5E7EB;
  --text:#1F2937;--text2:#6B7280;--accent:#DC2626;--accent2:#B91C1C;--accent-light:#FEE2E2;
  --warn:#D97706;--green:#059669;--blue:#2563EB;--purple:#7C3AED;--cyan:#0891B2;
  --card-radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);}
.nav-tabs{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-left:20px;}
.nav-tab{padding:8px 20px;background:var(--bg3);border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.nav-tab.active{background:var(--accent);color:#fff;}

/* SHARED */
.page{display:none;padding:20px 24px;max-width:1600px;margin:0 auto;}
.page.active{display:block;}
.filters-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:16px 20px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.filters-row{display:flex;flex-wrap:wrap;gap:12px;align-items:end;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-group label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.filter-group select,.filter-group input[type=date],.filter-group input[type=number]{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;}
.filter-group select:focus,.filter-group input:focus{outline:none;border-color:var(--accent);}

.mode-tabs{display:flex;gap:0;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.mode-tab{padding:8px 16px;background:var(--bg3);border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.mode-tab.active{background:var(--accent);color:#fff;}

.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:18px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.stat-card .card-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.stat-card .card-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.stat-card .card-sub{font-size:11px;color:var(--text2);margin-top:2px;}

.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:18px;}
.chart-box h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.chart-box h3 .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.chart-canvas-wrap{position:relative;height:300px;}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}

/* TABLE shared */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.table-wrap .tw-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.table-wrap .tw-header h3{font-size:14px;font-weight:700;}
.table-wrap .tw-header .info{font-size:12px;color:var(--text2);}
table.dt{width:100%;border-collapse:collapse;font-size:13px;}
table.dt th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--bg2);cursor:pointer;position:sticky;top:0;z-index:2;}
table.dt th:hover{color:var(--accent);}
table.dt td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:12px;white-space:nowrap;}
table.dt tr:hover td{background:var(--accent-light);}
table.dt tr.team-row td{background:#FEF2F2;font-weight:700;}
td.pn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;position:sticky;left:0;background:var(--bg2);z-index:1;}
tr:hover td.pn,tr.team-row td.pn{background:inherit;}

/* HEATMAP */
.h-low{color:#DC2626;}.h-mid{color:#D97706;}.h-high{color:#059669;}.h-top{color:#0891B2;}
.val-red{color:var(--accent);}.val-green{color:var(--green);}.val-blue{color:var(--blue);}.val-purple{color:var(--purple);}.val-cyan{color:var(--cyan);}.val-warn{color:var(--warn);}

/* PREDICTION */
.pred-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.pred-section h3{font-size:15px;font-weight:700;margin-bottom:16px;}
.pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.pred-controls{display:flex;flex-direction:column;gap:12px;}
.ws{display:flex;flex-direction:column;gap:3px;}
.ws .ws-h{display:flex;justify-content:space-between;font-size:12px;}
.ws .ws-l{color:var(--text2);}.ws .ws-v{font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;}
.ws input[type=range]{width:100%;height:5px;-webkit-appearance:none;background:var(--bg3);border-radius:3px;outline:none;}
.ws input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.scenario-badge{display:inline-block;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;background:var(--accent-light);color:var(--accent);border:1px solid rgba(220,38,38,.2);}
.pred-results{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pred-card{background:var(--bg3);border-radius:8px;padding:12px;text-align:center;}
.pred-card .pc-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.pred-card .pc-v{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
.pred-card.hl{background:var(--accent-light);border:1px solid rgba(220,38,38,.25);grid-column:1/-1;}
.pred-card.hl .pc-v{font-size:26px;color:var(--accent);}

/* KPI TOGGLES */
.kpi-toggles{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.kpi-tog{padding:5px 11px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;user-select:none;}
.kpi-tog.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

.ratio-bar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:5px;}

@media(max-width:900px){.chart-grid{grid-template-columns:1fr;}.pred-grid{grid-template-columns:1fr;}.filters-row{flex-direction:column;}.cards-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.cards-row{grid-template-columns:1fr;}.page{padding:12px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">GPS DASHBOARD</span>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('player')">Giocatore</button>
      <button class="nav-tab" onclick="showPage('team')">Team Overview</button>
    </div>
  </div>
</div>

<!-- ==================== PAGE: PLAYER ==================== -->
<div class="page active" id="pagPlayer">
  <div class="filters-panel">
    <div class="filters-row">
      <div class="filter-group"><label>Giocatore</label><select id="pPlayer" onchange="pRefresh()"></select></div>
      <div class="filter-group"><label>KPI</label><select id="pKPI" onchange="pRefresh()"></select></div>
      <div class="filter-group"><label>Settimana</label><select id="pWeek" onchange="pRefresh()"></select></div>
      <div class="filter-group"><label>Sessioni Previste</label><input type="number" id="pSess" min="1" max="10" value="5" onchange="pRefresh()"></div>
    </div>
  </div>
  <div class="cards-row" id="pCards"></div>
  <div class="chart-grid">
    <div class="chart-box"><h3><span class="dot" style="background:var(--accent)"></span>Andamento Settimanale</h3><div class="chart-canvas-wrap"><canvas id="pChartWeekly"></canvas></div></div>
    <div class="chart-box"><h3><span class="dot" style="background:var(--blue)"></span>Match Day vs Team AVG</h3><div class="chart-canvas-wrap"><canvas id="pChartMD"></canvas></div></div>
  </div>
  <div class="pred-section">
    <h3>Previsione Settimanale Pesata</h3>
    <div class="pred-grid">
      <div class="pred-controls">
        <div class="mode-tabs"><button class="mode-tab active" id="btnAuto" onclick="setPredMode('auto')">Auto</button><button class="mode-tab" id="btnManual" onclick="setPredMode('manual')">Personalizzato</button></div>
        <div class="scenario-badge" id="scenBadge">Scenario: Normale</div>
        <div id="sliders">
          <div class="ws"><div class="ws-h"><span class="ws-l">W1 Sett. Precedente</span><span class="ws-v" id="w1v">30</span></div><input type="range" id="sW1" min="0" max="100" step="5" value="30" oninput="onW()"></div>
          <div class="ws"><div class="ws-h"><span class="ws-l">W2 Target</span><span class="ws-v" id="w2v">30</span></div><input type="range" id="sW2" min="0" max="100" step="5" value="30" oninput="onW()"></div>
          <div class="ws"><div class="ws-h"><span class="ws-l">W3 Media 5 Sett.</span><span class="ws-v" id="w3v">25</span></div><input type="range" id="sW3" min="0" max="100" step="5" value="25" oninput="onW()"></div>
          <div class="ws"><div class="ws-h"><span class="ws-l">W4 Stesso N° Sessioni</span><span class="ws-v" id="w4v">15</span></div><input type="range" id="sW4" min="0" max="100" step="5" value="15" oninput="onW()"></div>
        </div>
      </div>
      <div class="pred-results" id="pPred"></div>
    </div>
  </div>
  <div class="table-wrap"><div class="tw-header"><h3>Rapporto Carico vs Team AVG (%)</h3></div><table class="dt" id="pRatioTbl"></table></div>
  <div class="table-wrap"><div class="tw-header"><h3>Dettaglio Sessioni</h3></div><div style="overflow-x:auto;max-height:500px;overflow-y:auto;"><table class="dt" id="pDetailTbl"></table></div></div>
</div>

<!-- ==================== PAGE: TEAM ==================== -->
<div class="page" id="pagTeam">
  <div class="filters-panel">
    <div class="filters-row">
      <div class="filter-group"><label>Filtro periodo</label><div class="mode-tabs"><button class="mode-tab active" id="tModeW" onclick="tSetFM('week')">Settimane</button><button class="mode-tab" id="tModeD" onclick="tSetFM('date')">Date</button></div></div>
      <div class="filter-group" id="tWFG"><label>Da Sett.</label><select id="tWF" onchange="tRefresh()"></select></div>
      <div class="filter-group" id="tWTG"><label>A Sett.</label><select id="tWT" onchange="tRefresh()"></select></div>
      <div class="filter-group" id="tDFG" style="display:none"><label>Da Data</label><input type="date" id="tDF" onchange="tRefresh()"></div>
      <div class="filter-group" id="tDTG" style="display:none"><label>A Data</label><input type="date" id="tDT" onchange="tRefresh()"></div>
      <div class="filter-group"><label>Sessione</label><select id="tSessType" onchange="tRefresh()"><option value="all">Tutte</option><option value="training">Allenamenti</option><option value="match">Partite</option></select></div>
      <div class="filter-group"><label>Aggregazione</label><div class="mode-tabs"><button class="mode-tab active" id="tAggS" onclick="tSetAgg('sum')">Somma</button><button class="mode-tab" id="tAggA" onclick="tSetAgg('avg')">Media</button></div></div>
      <div class="filter-group"><label>DIFF</label><select id="tDiff" onchange="tRefresh()"><option value="all">Tutti</option><option value="no">No diff</option><option value="yes">Solo diff</option></select></div>
    </div>
    <div class="kpi-toggles" id="tKpiTog"></div>
  </div>
  <div class="cards-row" id="tCards"></div>
  <div class="table-wrap"><div class="tw-header"><h3 id="tTblTitle">Riepilogo Squadra</h3><span class="info" id="tTblInfo"></span></div><div style="overflow-x:auto;max-height:600px;overflow-y:auto;"><table class="dt" id="tMainTbl"></table></div></div>
  <div class="chart-box"><h3>Confronto Giocatori — <select id="tChartKPI" onchange="tUpdateChart()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-family:'DM Sans';font-size:13px;"></select></h3><div class="chart-canvas-wrap" style="height:400px"><canvas id="tChart"></canvas></div></div>
</div>

function gP(){return[...new Set(D.map(r=>r.PLAYER))].filter(p=>p!=='Team AVG').sort();}
function gW(){return[...new Set(D.filter(r=>r.WEEK>0).map(r=>r.WEEK))].sort((a,b)=>a-b);}
function gD(){return[...new Set(D.map(r=>r.DATA))].sort();}
function fm(v,d=0){if(v==null||isNaN(v))return'—';return v.toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});}
function sumK(rows,k){const v=rows.map(r=>r[k]).filter(x=>x!=null);if(!v.length)return null;if(KAVG[k]==='avg')return v.reduce((a,b)=>a+b,0)/v.length;return v.reduce((a,b)=>a+b,0);}
function scenFromSess(n){if(n>=8)return"Pre-season";if(n>=5)return"Normale";if(n>=3)return"Settimana corta";return"Post-partita";}

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  if(p==='player'){document.getElementById('pagPlayer').classList.add('active');document.querySelectorAll('.nav-tab')[0].classList.add('active');}
  else{document.getElementById('pagTeam').classList.add('active');document.querySelectorAll('.nav-tab')[1].classList.add('active');}

let pChW=null,pChM=null,predMode='auto';

function pInit(){
  const ps=gP(),ws=gW();
  const pS=document.getElementById('pPlayer'),kS=document.getElementById('pKPI'),wS=document.getElementById('pWeek');
  ps.forEach(p=>{pS.innerHTML+=`<option>${p}</option>`;});

  ws.forEach(w=>{wS.innerHTML+=`<option value="${w}">Sett. ${w}</option>`;});
  wS.value=ws[ws.length-1];
  setPredMode('auto');
  pRefresh();
}

function pRefresh(){
  const pl=document.getElementById('pPlayer').value,kpi=document.getElementById('pKPI').value,wk=+document.getElementById('pWeek').value,ss=+document.getElementById('pSess').value||5;
  pUpdateScen(ss);pCards(pl,kpi,wk);pWeeklyChart(pl,kpi,wk);pMDChart(pl,kpi);pPrediction(pl,kpi,wk,ss);pRatio(pl,wk);pDetail(pl,wk);
}

function pUpdateScen(ss){
  const sc=scenFromSess(ss);document.getElementById('scenBadge').textContent='Scenario: '+sc;
  if(predMode==='auto'){const w=SCEN[sc]||SCEN.Normale;['sW1','sW2','sW3','sW4'].forEach((id,i)=>{const v=[w.w1,w.w2,w.w3,w.w4][i];document.getElementById(id).value=v;document.getElementById(['w1v','w2v','w3v','w4v'][i]).textContent=v;});}
}
function setPredMode(m){predMode=m;document.getElementById('btnAuto').classList.toggle('active',m==='auto');document.getElementById('btnManual').classList.toggle('active',m==='manual');document.querySelectorAll('#sliders input').forEach(s=>s.disabled=m==='auto');if(m==='auto')pRefresh();}
function onW(){['w1v','w2v','w3v','w4v'].forEach((id,i)=>document.getElementById(id).textContent=document.getElementById(['sW1','sW2','sW3','sW4'][i]).value);pRefresh();}

function pCards(pl,kpi,wk){
  const tr=D.filter(r=>r.PLAYER===pl&&r.WEEK===wk&&r['NEXT MD']!==0),md=D.filter(r=>r.PLAYER===pl&&r.WEEK===wk&&r['NEXT MD']===0),tmd=D.filter(r=>r.PLAYER==='Team AVG'&&r.WEEK===wk&&r['NEXT MD']===0);
  const ws=sumK(tr,kpi),mv=sumK(md,kpi),tv=sumK(tmd,kpi),rt=ws!=null&&tv?ws/tv*100:null;
  document.getElementById('pCards').innerHTML=`
    <div class="stat-card"><div class="card-label">Somma Sett. (${kpi})</div><div class="card-value val-red">${fm(ws)}</div><div class="card-sub">${tr.length} sessioni</div></div>
    <div class="stat-card"><div class="card-label">Match Day</div><div class="card-value val-blue">${fm(mv)}</div></div>
    <div class="stat-card"><div class="card-label">Team AVG MD</div><div class="card-value val-purple">${fm(tv)}</div></div>
    <div class="stat-card"><div class="card-label">Rapporto vs Team</div><div class="card-value ${rt!=null?(rt>=100?'val-green':'val-warn'):''}">${rt!=null?fm(rt,1)+'%':'—'}</div></div>
    <div class="stat-card"><div class="card-label">Target (${kpi})</div><div class="card-value val-cyan">${fm(TARGETS[kpi])}</div></div>`;
}

function pWeeklyChart(pl,kpi,wk){
  const ws=gW(),labels=[],vals=[],meds=[];
  const allS=[];ws.forEach(w=>{const d=D.filter(r=>r.PLAYER===pl&&r.WEEK===w&&r['NEXT MD']!==0);const s=sumK(d,kpi);if(s!=null)allS.push(s);});
  allS.sort((a,b)=>a-b);const med=allS.length?allS[Math.floor(allS.length/2)]:0;
  ws.forEach(w=>{labels.push('S'+w);vals.push(sumK(D.filter(r=>r.PLAYER===pl&&r.WEEK===w&&r['NEXT MD']!==0),kpi));meds.push(med);});
  if(pChW)pChW.destroy();
  pChW=new Chart(document.getElementById('pChartWeekly'),{type:'bar',data:{labels,datasets:[{label:pl,data:vals,backgroundColor:vals.map((_,i)=>labels[i]==='S'+wk?'rgba(220,38,38,.85)':'rgba(220,38,38,.35)'),borderRadius:3,order:2},{label:'Mediana',data:meds,type:'line',borderColor:'#D97706',borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6B7280',font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:'#6B7280',font:{size:10}},grid:{color:'#E5E7EB'}},y:{ticks:{color:'#6B7280',font:{family:'Space Mono',size:10}},grid:{color:'#E5E7EB'}}}}});
}

function pMDChart(pl,kpi){
  const ws=gW().filter(w=>D.some(r=>r.PLAYER===pl&&r.WEEK===w&&r['NEXT MD']===0&&r[kpi]!=null));
  const labels=[],pv=[],tv=[];
  ws.forEach(w=>{labels.push('S'+w);pv.push(sumK(D.filter(r=>r.PLAYER===pl&&r.WEEK===w&&r['NEXT MD']===0),kpi));tv.push(sumK(D.filter(r=>r.PLAYER==='Team AVG'&&r.WEEK===w&&r['NEXT MD']===0),kpi));});
  if(pChM)pChM.destroy();
  pChM=new Chart(document.getElementById('pChartMD'),{type:'bar',data:{labels,datasets:[{label:pl,data:pv,backgroundColor:'rgba(220,38,38,.6)',borderRadius:3},{label:'Team AVG',data:tv,backgroundColor:'rgba(124,58,237,.35)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6B7280',font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:'#6B7280',font:{size:10}},grid:{color:'#E5E7EB'}},y:{ticks:{color:'#6B7280',font:{family:'Space Mono',size:10}},grid:{color:'#E5E7EB'}}}}});
}

function pPrediction(pl,kpi,wk,ss){
  const w=getW();let res={pw:null,tg:TARGETS[kpi],m5:null,mn:null,pred:null};
  res.pw=sumK(D.filter(r=>r.PLAYER===pl&&r.WEEK===wk-1&&r['NEXT MD']!==0),kpi);
  let s5=0,c5=0;for(let i=wk-5;i<wk;i++){const s=sumK(D.filter(r=>r.PLAYER===pl&&r.WEEK===i&&r['NEXT MD']!==0),kpi);if(s!=null){s5+=s;c5++;}}res.m5=c5?s5/c5:null;
  const wsAll=gW().filter(x=>x<wk),mn=[];wsAll.forEach(x=>{const d=D.filter(r=>r.PLAYER===pl&&r.WEEK===x&&r['NEXT MD']!==0);if(d.length===ss){const s=sumK(d,kpi);if(s!=null)mn.push(s);}});res.mn=mn.length?mn.reduce((a,b)=>a+b,0)/mn.length:null;
  let num=0,den=0;if(res.pw!=null){num+=w.w1*res.pw;den+=w.w1;}if(res.tg!=null){num+=w.w2*res.tg;den+=w.w2;}if(res.m5!=null){num+=w.w3*res.m5;den+=w.w3;}if(res.mn!=null){num+=w.w4*res.mn;den+=w.w4;}res.pred=den?num/den:null;
  document.getElementById('pPred').innerHTML=`
    <div class="pred-card"><div class="pc-l">W1 Sett.Prec (${w.w1}%)</div><div class="pc-v val-red">${fm(res.pw)}</div></div>
    <div class="pred-card"><div class="pc-l">W2 Target (${w.w2}%)</div><div class="pc-v val-cyan">${fm(res.tg)}</div></div>
    <div class="pred-card"><div class="pc-l">W3 Media 5S (${w.w3}%)</div><div class="pc-v val-blue">${fm(res.m5)}</div></div>
    <div class="pred-card"><div class="pc-l">W4 Stesso N° (${w.w4}%)</div><div class="pc-v val-purple">${fm(res.mn)}</div></div>
    <div class="pred-card hl"><div class="pc-l">Previsione ${kpi}</div><div class="pc-v">${fm(res.pred)}</div></div>`;
}

function pRatio(pl,wk){
  const tr=D.filter(r=>r.PLAYER===pl&&r.WEEK===wk&&r['NEXT MD']!==0),tmd=D.filter(r=>r.PLAYER==='Team AVG'&&r.WEEK===wk&&r['NEXT MD']===0);
  let h='<thead><tr><th>KPI</th><th>Somma Sett.</th><th>Team AVG MD</th><th>Rapporto</th></tr></thead><tbody>';
  KPIS.forEach(k=>{const ws=sumK(tr,k),tv=sumK(tmd,k),rt=ws!=null&&tv?ws/tv*100:null;
    const col=rt!=null?(rt>=100?'var(--green)':rt>=80?'var(--warn)':'var(--accent)'):'var(--text2)';
    h+=`<tr><td class="pn">${k}</td><td>${fm(ws)}</td><td>${fm(tv)}</td><td style="color:${col}">${rt!=null?fm(rt,1)+'%':'—'}<span class="ratio-bar" style="width:${rt?Math.min(rt,200)/2:0}px;background:${col}"></span></td></tr>`;});
  h+='</tbody>';document.getElementById('pRatioTbl').innerHTML=h;
}

function pDetail(pl,wk){
  const data=D.filter(r=>r.PLAYER===pl&&r.WEEK===wk).sort((a,b)=>a.DATA.localeCompare(b.DATA));
  let h='<thead><tr><th>Data</th><th>Next MD</th><th>Tipo</th><th>DIFF</th>';
  ['MIN','D','D/MIN','D>16','D>20','D>25','D>30','DA>2','DA>3','DD<-2','DD<-3'].forEach(k=>h+=`<th>${k}</th>`);
  h+='</tr></thead><tbody>';
  data.forEach(r=>{const isMD=r['NEXT MD']===0;h+=`<tr style="${isMD?'background:#FEF2F2':''}"><td>${r.DATA}</td><td>${r['NEXT MD']}</td><td>${r['SESSION TYPE']||'—'}</td><td>${r.DIFF===1?'✓':''}</td>`;
    ['MIN','D','D/MIN','D>16','D>20','D>25','D>30','DA>2','DA>3','DD<-2','DD<-3'].forEach(k=>h+=`<td>${fm(r[k])}</td>`);h+='</tr>';});
  h+='</tbody>';document.getElementById('pDetailTbl').innerHTML=h;
}

// ========================================================
//  TEAM PAGE
// ========================================================
let tFM='week',tAgg='sum',tActKPI=new Set(['D','D>16','D>20','DA>2','DA>3','DD<-2','DD<-3']),tSortC=null,tSortD='desc',tCh=null;

function tInit(){
  const ws=gW(),ds=gD();
  const wf=document.getElementById('tWF'),wt=document.getElementById('tWT');
  ws.forEach(w=>{wf.innerHTML+=`<option value="${w}">Sett. ${w}</option>`;wt.innerHTML+=`<option value="${w}">Sett. ${w}</option>`;});
  wf.value=ws[0];wt.value=ws[ws.length-1];
  document.getElementById('tDF').value=ds[0];document.getElementById('tDT').value=ds[ds.length-1];
  const tog=document.getElementById('tKpiTog');
  KPIS.forEach(k=>{const d=document.createElement('div');d.className='kpi-tog'+(tActKPI.has(k)?' on':'');d.textContent=k;d.onclick=()=>{if(tActKPI.has(k)){tActKPI.delete(k);d.classList.remove('on');}else{tActKPI.add(k);d.classList.add('on');}tRefresh();};tog.appendChild(d);});
  const cs=document.getElementById('tChartKPI');KPIS.forEach(k=>cs.innerHTML+=`<option>${k}</option>`);
  tRefresh();
}

function tSetFM(m){tFM=m;document.getElementById('tModeW').classList.toggle('active',m==='week');document.getElementById('tModeD').classList.toggle('active',m==='date');['tWFG','tWTG'].forEach(id=>document.getElementById(id).style.display=m==='week'?'':'none');['tDFG','tDTG'].forEach(id=>document.getElementById(id).style.display=m==='date'?'':'none');tRefresh();}
function tSetAgg(m){tAgg=m;document.getElementById('tAggS').classList.toggle('active',m==='sum');document.getElementById('tAggA').classList.toggle('active',m==='avg');tRefresh();}

function tGetData(){
  let d=D;
  if(tFM==='week'){const f=+document.getElementById('tWF').value,t=+document.getElementById('tWT').value;d=d.filter(r=>r.WEEK>=f&&r.WEEK<=t);}
  else{const f=document.getElementById('tDF').value,t=document.getElementById('tDT').value;d=d.filter(r=>r.DATA>=f&&r.DATA<=t);}
  const st=document.getElementById('tSessType').value;
  if(st==='training')d=d.filter(r=>r['NEXT MD']!==0);else if(st==='match')d=d.filter(r=>r['NEXT MD']===0);
  const df=document.getElementById('tDiff').value;
  if(df==='no')d=d.filter(r=>r.DIFF!==1);else if(df==='yes')d=d.filter(r=>r.DIFF===1);
  return d;
}

function tCalc(data,pl){
  const pd=data.filter(r=>r.PLAYER===pl),st={player:pl,sessions:pd.length,kpis:{}};
  [...tActKPI].forEach(k=>{const v=pd.map(r=>r[k]).filter(x=>x!=null&&!isNaN(x));if(!v.length){st.kpis[k]=null;return;}
    st.kpis[k]=tAgg==='avg'||KAVG[k]==='avg'?v.reduce((a,b)=>a+b,0)/v.length:v.reduce((a,b)=>a+b,0);});
  return st;
}

function tRefresh(){
  const data=tGetData(),ps=gP(),kpis=[...tActKPI];
  const all=ps.map(p=>tCalc(data,p)),tav=tCalc(data,'Team AVG');
  const tot=data.filter(r=>r.PLAYER!=='Team AVG').length,mds=data.filter(r=>r['NEXT MD']===0&&r.PLAYER!=='Team AVG').length;
  document.getElementById('tCards').innerHTML=`
    <div class="stat-card"><div class="card-label">Giocatori</div><div class="card-value val-red">${ps.length}</div></div>
    <div class="stat-card"><div class="card-label">Sessioni</div><div class="card-value val-blue">${tot}</div></div>
    <div class="stat-card"><div class="card-label">Match Days</div><div class="card-value val-purple">${mds}</div></div>
    <div class="stat-card"><div class="card-label">Giorni</div><div class="card-value val-cyan">${new Set(data.map(r=>r.DATA)).size}</div></div>
    <div class="stat-card"><div class="card-label">DIFF</div><div class="card-value val-warn">${data.filter(r=>r.DIFF===1&&r.PLAYER!=='Team AVG').length}</div></div>`;
  document.getElementById('tTblInfo').textContent=`${tAgg==='sum'?'SOMMA':'MEDIA'} | ${kpis.length} KPI | ${tot} sessioni`;

  const avpk={};kpis.forEach(k=>avpk[k]=all.map(s=>s.kpis[k]).filter(v=>v!=null));
  let sorted=[...all];
  if(tSortC)sorted.sort((a,b)=>{let va,vb;if(tSortC==='player'){va=a.player;vb=b.player;return tSortD==='asc'?va.localeCompare(vb):vb.localeCompare(va);}if(tSortC==='sessions'){va=a.sessions;vb=b.sessions;}else{va=a.kpis[tSortC];vb=b.kpis[tSortC];}va=va??-Infinity;vb=vb??-Infinity;return tSortD==='asc'?va-vb:vb-va;});

  let h='<thead><tr><th class="pn" onclick="tSort(\'player\')">Giocatore</th><th onclick="tSort(\'sessions\')">Sess.</th>';
  kpis.forEach(k=>h+=`<th onclick="tSort('${k}')">${k}</th>`);
  h+='</tr></thead><tbody>';
  h+=`<tr class="team-row"><td class="pn">Team AVG</td><td>${tav.sessions}</td>`;kpis.forEach(k=>h+=`<td>${fm(tav.kpis[k],k==='D/MIN'?1:0)}</td>`);h+='</tr>';
  sorted.forEach(s=>{h+=`<tr><td class="pn">${s.player}</td><td>${s.sessions}</td>`;
    kpis.forEach(k=>{const v=s.kpis[k],vals=avpk[k];let hc='';if(v!=null&&vals.length){const rk=vals.filter(x=>x<=v).length/vals.length;hc=rk<=.25?'h-low':rk<=.5?'h-mid':rk<=.75?'h-high':'h-top';}
      h+=`<td class="${hc}">${fm(v,k==='D/MIN'?1:0)}</td>`;});h+='</tr>';});
  h+='</tbody>';document.getElementById('tMainTbl').innerHTML=h;
  tUpdateChart();
}

function tSort(c){if(tSortC===c)tSortD=tSortD==='asc'?'desc':'asc';else{tSortC=c;tSortD='desc';}tRefresh();}

function tUpdateChart(){
  const data=tGetData(),ps=gP(),kpi=document.getElementById('tChartKPI').value;
  const stats=ps.map(p=>{const pd=data.filter(r=>r.PLAYER===p),v=pd.map(r=>r[kpi]).filter(x=>x!=null&&!isNaN(x));
    if(!v.length)return{p,v:0};return{p,v:tAgg==='avg'||KAVG[kpi]==='avg'?v.reduce((a,b)=>a+b,0)/v.length:v.reduce((a,b)=>a+b,0)};}).sort((a,b)=>b.v-a.v);
  const td=data.filter(r=>r.PLAYER==='Team AVG'),tv=td.map(r=>r[kpi]).filter(x=>x!=null),ta=tv.length?(tv.reduce((a,b)=>a+b,0)/(tAgg==='avg'||KAVG[kpi]==='avg'?tv.length:1)):0;
  const cols=stats.map(s=>{if(!ta)return'rgba(220,38,38,.5)';const r=s.v/ta;return r>=1.1?'rgba(8,145,178,.6)':r>=.9?'rgba(5,150,105,.5)':r>=.7?'rgba(217,119,6,.5)':'rgba(220,38,38,.5)';});
  if(tCh)tCh.destroy();
  tCh=new Chart(document.getElementById('tChart'),{type:'bar',data:{labels:stats.map(s=>s.p),datasets:[{label:kpi,data:stats.map(s=>s.v),backgroundColor:cols,borderRadius:3},{label:'Team AVG',data:stats.map(()=>ta),type:'line',borderColor:'#7C3AED',borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6B7280',font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:'#6B7280',font:{family:'Space Mono',size:10}},grid:{color:'#E5E7EB'}},y:{ticks:{color:'#6B7280',font:{size:11}},grid:{color:'#F3F4F6'}}}}});
}

// ===== BOOT =====
pInit();tInit();
</script>
</body>
</html>
